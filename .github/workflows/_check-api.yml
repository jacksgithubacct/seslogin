name: API check (reusable)
on:
  workflow_call:

env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  api_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api
      - name: Create JWT_SECRET
        run: echo "testsecret" > api/jwt_secret.local
      - name: Run rustfmt check
        run: cd api && cargo fmt --check
      - name: Check GraphQL schema is up to date
        run: |
          cd api
          cargo run --locked --bin export-schema > /tmp/schema.generated.graphql
          diff -u schema.graphql /tmp/schema.generated.graphql
      - name: Run Clippy
        run: cd api && cargo clippy --locked --all-targets --all-features
      - name: Run tests
        run: cd api && cargo test --locked
