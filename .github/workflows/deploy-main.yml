name: Deploy (main)

on:
  push:
    branches:
      - main

jobs:
  api_check:
    uses: ./.github/workflows/_check-api.yml

  web_check:
    uses: ./.github/workflows/_check-web.yml

  pagination_check:
    uses: ./.github/workflows/_check-pagination.yml
    secrets: inherit

  deploy_lambdas:
    # Note: AWS_ACCOUNT_ID must be set as a repository secret.
    # It is used to construct Lambda IAM role ARNs (e.g. arn:aws:iam::<account-id>:role/...).
    needs: [api_check, web_check, pagination_check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: Write .env file
        run: |
          source .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > api/.env
          echo "DB_PREFIX=$DB_PREFIX" >> api/.env

      - name: Install cargo-lambda
        run: pip install cargo-lambda

      - name: Build all lambdas
        working-directory: ./api
        run: cargo lambda build --release --bin lambda --bin sync-members-lambda --bin dispatcher-lambda --bin checker-lambda --bin nitc-export-lambda --bin healthcheck-lambda --bin activity-summary-lambda --bin sync-locations-lambda

      - name: Deploy seslogin-test-api
        working-directory: ./api
        run: cargo lambda deploy --binary-name lambda --role arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/seslogin-test-api-lambda-role seslogin-test-api
        env:
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy seslogin-sync-members
        working-directory: ./api
        run: cargo lambda deploy --binary-name sync-members-lambda --role arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/seslogin-sync-lambda-role seslogin-sync-members
        env:
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy seslogin-dispatcher
        working-directory: ./api
        run: cargo lambda deploy --binary-name dispatcher-lambda --role arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/seslogin-dispatcher-lambda-role seslogin-dispatcher
        env:
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy seslogin-checker
        working-directory: ./api
        run: cargo lambda deploy --binary-name checker-lambda --role arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/seslogin-checker-lambda-role seslogin-checker
        env:
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy seslogin-nitc-export
        working-directory: ./api
        run: cargo lambda deploy --binary-name nitc-export-lambda --role arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/seslogin-nitc-export-lambda-role seslogin-nitc-export
        env:
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy seslogin-healthcheck
        working-directory: ./api
        run: cargo lambda deploy --binary-name healthcheck-lambda --role arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/seslogin-healthcheck-lambda-role seslogin-healthcheck
        env:
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy seslogin-activity-summary
        working-directory: ./api
        run: cargo lambda deploy --binary-name activity-summary-lambda --role arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/seslogin-activity-summary-lambda-role seslogin-activity-summary
        env:
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy seslogin-sync-locations
        working-directory: ./api
        run: cargo lambda deploy --binary-name sync-locations-lambda --role arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/seslogin-sync-locations-lambda-role seslogin-sync-locations
        env:
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy_web:
    needs: deploy_lambdas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: ./web
        run: npm install

      - name: Run relay compiler
        working-directory: ./web
        run: npm run relay

      - name: Build web app
        working-directory: ./web
        env:
          VITE_API_URL: ${{ vars.TEST_API_URL }}
          VITE_BEACON_URL: ${{ vars.BEACON_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          VITE_CLIENT_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Deploy to S3
        run: aws s3 sync --follow-symlinks --delete ./web/dist s3://test.seslogin.com
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "ap-southeast-2"

      - name: Invalidate CloudFront
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.TEST_CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
